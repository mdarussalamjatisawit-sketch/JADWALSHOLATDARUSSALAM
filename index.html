<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid DarUSSALAM - Responsive Fix</title>
    <style>
        /* CSS DASAR & RESPONSIVE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: #000 url('masjid.jpg') no-repeat center center fixed;
            background-size: cover; 
            color: white; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER */
        .header-section { background: #000; text-align: center; padding: 5px 0; border-bottom: 3px solid #ff00ff; }
        .header-text { font-size: 3rem; font-weight: 900; color: #ffd700; text-transform: uppercase; text-shadow: 0 0 15px #ff00ff; }
        
        @media (max-width: 600px) {
            .header-text { font-size: 1.5rem; }
        }

        /* AREA TENGAH */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 15px;
            padding: 10px;
        }

        #jam-digital {
            font-weight: 900;
            font-size: clamp(4rem, 15vw, 9rem); 
            line-height: 1;
            background: linear-gradient(to bottom, #ffd700 20%, #b8860b 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 6px #000);
        }

        .dates { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; font-size: clamp(1rem, 4vw, 2rem); font-weight: 800; }
        .tgl-box { background: rgba(0, 0, 0, 0.7); padding: 5px 20px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); }
        #tgl-hijriah { color: #B1FB17; -webkit-text-fill-color: #B1FB17; }

        /* KEUANGAN & INFO */
        .info-container { display: flex; flex-wrap: wrap; gap: 15px; width: 95%; justify-content: center; }
        .card { background: rgba(0, 0, 0, 0.85); border: 2px solid #2e7d32; border-radius: 12px; flex: 1; min-width: 300px; max-width: 500px; }
        .card-h { background: #2e7d32; color: #ffd700; padding: 5px; font-weight: bold; text-align: center; }
        .card-b { padding: 10px 15px; }
        .row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 3px 0; font-size: 1rem; }

        /* --- JADWAL SHOLAT - PENYESUAIAN MEPET BAWAH --- */
        .prayer-section {
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 10px;
            /* Padding bawah 0px agar blok hijau menempel ke dasar */
            padding: 10px 10px 0px 10px; 
            background: rgba(0, 40, 0, 0.95);
            border-top: 4px solid #ffd700;
            margin-top: auto; 
            margin-bottom: 0px;
            height: auto;
        }

        .p-box { 
            background: rgba(0,0,0,0.8); 
            border: 2px solid #ffd700; 
            /* Bawah kotak dibuat siku agar mepet bingkai TV */
            border-radius: 10px 10px 0 0; 
            /* Padding bawah 0px supaya angka jam bisa turun maksimal */
            padding: 8px 5px 0px 5px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .p-name { 
            color: #ffd700; 
            font-size: clamp(0.7rem, 2vw, 1rem); 
            font-weight: bold; 
            margin-bottom: 2px;
        }

        .p-time { 
            font-size: clamp(1.2rem, 5vw, 2.5rem); 
            font-weight: 900; 
            /* Menghilangkan jarak hampa di bawah angka agar tidak terpotong saat mepet */
            line-height: 0.9; 
            margin-bottom: 0px;
            padding-bottom: 2px; /* Jarak sangat tipis agar angka tidak hilang tertutup casing TV */
        }

        .next-sholat { 
            background: linear-gradient(145deg, #ffd700, #b8860b) !important; 
            transform: scale(1.03);
            box-shadow: 0 0 20px #ffd700;
            z-index: 5;
        }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* MODAL SHOLAT */
        #mode-sholat {
            display: none; position: fixed; inset: 0; background: #000; 
            z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="ui-normal">
    <div class="header-section">
        <div class="header-text">MASJID DARUSSALAM</div>
    </div>

    <div class="main-display">
        <div id="jam-digital">00:00:00</div>
        <div class="dates">
            <div class="tgl-box" id="tgl-masehi">--</div>
            <div class="tgl-box" id="tgl-hijriah">--</div>
        </div>
        
        <div class="info-container">
            <div class="card">
                <div class="card-h">KEUANGAN MASJID</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                    <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                    <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">IMAM & PENCERAMAH</div>
                <div class="card-b">
                    <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                    <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                    <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="prayer-section">
        <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
        <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
        <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
        <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
        <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
        <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
    </div>
</div>

<div id="mode-sholat">
    <h1 style="color:#ffd700; font-size: 15vw;">ADZAN</h1>
    <h2 id="sholat-nama" style="font-size: 10vw;"></h2>
</div>

<script>
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
    let jadwal = {};

    async function muatData() {
        try {
            const res = await fetch(urlCSV + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            const b2 = rows[2];
            
            document.getElementById('tgl-hijriah').innerText = rows[1][2] + " " + b2[0];
            jadwal = { "SUBUH": b2[1], "SYURUQ": b2[2], "ZUHUR": b2[3], "ASHAR": b2[4], "MAGHRIB": b2[5], "ISYA": b2[6] };
            
            for (let s in jadwal) { 
                let el = document.getElementById('sh-' + (s === "SYURUQ" ? "terbit" : s.toLowerCase()));
                if(el) el.innerText = jadwal[s];
            }

            document.getElementById('kas-in').innerText = b2[8];
            document.getElementById('kas-out').innerText = b2[9];
            document.getElementById('kas-saldo').innerText = b2[10];
            document.getElementById('im-t').innerText = b2[11];
            document.getElementById('im-s').innerText = b2[12];
            document.getElementById('im-j').innerText = b2[13];
        } catch (e) { console.error("Update Gagal"); }
    }

    function updateWaktu() {
        const now = new Date();
        document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID');
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        const jamMenit = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        
        let found = false;
        ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"].forEach(s => {
            let box = document.getElementById('box-' + s);
            box.classList.remove('next-sholat');
            if (!found && jamMenit < jadwal[s]) {
                box.classList.add('next-sholat');
                found = true;
            }
        });
    }

    setInterval(updateWaktu, 1000);
    muatData(); 
    setInterval(muatData, 600000);
</script>
</body>
</html>
