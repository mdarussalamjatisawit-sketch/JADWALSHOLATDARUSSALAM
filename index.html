<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid Darussalam - KHGT v3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body {
            min-height: 100vh; width: 100vw;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1590076215667-875d45308666?q=80&w=2000') no-repeat center center fixed;
            background-size: cover; color: white; display: flex; flex-direction: column; padding: 10px; overflow: hidden;
        }
        .header { text-align: center; background: rgba(0, 80, 0, 0.9); padding: 10px; border-radius: 15px; border: 3px solid #ffd700; margin-bottom: 10px; }
        .header h1 { font-size: 2.2rem; color: #ffd700; }
        .main { flex: 1; display: flex; gap: 15px; }
        .side { flex: 0.8; display: flex; flex-direction: column; gap: 10px; }
        .card { background: rgba(0, 0, 0, 0.7); border-radius: 15px; border: 2px solid #2e7d32; overflow: hidden; }
        .card-h { background: #2e7d32; padding: 8px; text-align: center; font-weight: bold; color: #ffd700; }
        .card-b { padding: 10px 20px; }
        .row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 8px 0; justify-content: space-between; font-size: 1.1rem; }
        .center { flex: 1.2; background: rgba(0, 0, 0, 0.4); border-radius: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        #jam { font-size: 8rem; font-weight: bold; line-height: 1; }
        #tgl-m { font-size: 1.8rem; color: #ffd700; }
        #tgl-h { font-size: 2rem; color: #00ff00; font-weight: bold; }
        .footer { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; }
        .box { background: rgba(0, 50, 0, 0.9); padding: 10px 5px; text-align: center; border: 2px solid #ffd700; border-radius: 12px; }
        .box-n { font-size: 1rem; color: #ffd700; font-weight: bold; }
        .box-t { font-size: 2.8rem; font-weight: bold; color: #fff; }
        #debug { position: fixed; bottom: 0; right: 0; font-size: 10px; color: gray; padding: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MASJID DARUSSALAM</h1>
        <p>Jadwal KHGT Muhammadiyah</p>
    </div>

    <div class="main">
        <div class="side">
            <div class="card">
                <div class="card-h">KEUANGAN</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="k-in">...</span></div>
                    <div class="row"><span>Keluar</span><span id="k-out">...</span></div>
                    <div class="row" style="color:#ffd700; border:none; font-weight:bold;"><span>SALDO</span><span id="k-s">...</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">PETUGAS</div>
                <div class="card-b">
                    <div class="row"><span>IMAM TARAWIH</span><span id="i-t">-</span></div>
                    <div class="row"><span>IMAM SUBUH</span><span id="i-s">-</span></div>
                    <div class="row"><span>IMAM JUM'AT</span><span id="i-j">-</span></div>
                </div>
            </div>
        </div>
        <div class="center">
            <div id="jam">00:00:00</div>
            <div id="tgl-m">--</div>
            <div id="tgl-h">--</div>
        </div>
    </div>

    <div class="footer">
        <div class="box"><div class="box-n">SUBUH</div><div class="box-t" id="s-fajr">--:--</div></div>
        <div class="box"><div class="box-n">SYURUQ</div><div class="box-t" id="s-sunr">--:--</div></div>
        <div class="box"><div class="box-n">ZUHUR</div><div class="box-t" id="s-dhuhr">--:--</div></div>
        <div class="box"><div class="box-n">ASHAR</div><div class="box-t" id="s-asr">--:--</div></div>
        <div class="box"><div class="box-n">MAGHRIB</div><div class="box-t" id="s-magh">--:--</div></div>
        <div class="box"><div class="box-n">ISYA</div><div class="box-t" id="s-isha">--:--</div></div>
    </div>

    <div id="debug">Status: Memuat...</div>

    <script>
        let jadwal = {};
        const urlTampilan = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=73762516&single=true&output=csv';
        const urlJadwal = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';

        // Fungsi membelah baris CSV dengan koma atau titik koma
        function splitCSV(row) {
            if (row.includes(';')) return row.split(';');
            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        }

        async function muatData() {
            try {
                document.getElementById('debug').innerText = "Status: Mencoba ambil data...";
                
                // 1. DATA TAMPILAN
                const resT = await fetch(urlTampilan + '&t=' + Date.now());
                const rowsT = (await resT.text()).split(/\r?\n/);
                if (rowsT.length > 1) {
                    const d = splitCSV(rowsT[1]);
                    document.getElementById('k-in').innerText = d[1]?.replace(/"/g,'') || '0';
                    document.getElementById('k-out').innerText = d[2]?.replace(/"/g,'') || '0';
                    document.getElementById('k-s').innerText = d[3]?.replace(/"/g,'') || '0';
                    document.getElementById('i-t').innerText = d[4]?.replace(/"/g,'') || '-';
                    document.getElementById('i-s').innerText = d[5]?.replace(/"/g,'') || '-';
                    document.getElementById('i-j').innerText = d[6]?.replace(/"/g,'') || '-';
                }

                // 2. DATA JADWAL
                const resJ = await fetch(urlJadwal + '&t=' + Date.now());
                const rowsJ = (await resJ.text()).split(/\r?\n/);
                
                const tglSaja = new Date().getDate().toString();
                let ditemukan = false;

                for (let i = 1; i < rowsJ.length; i++) {
                    const col = splitCSV(rowsJ[i]);
                    let teksTgl = col[0]?.replace(/"/g, '') || "";
                    
                    // Cek jika kolom pertama mengandung angka tanggal hari ini
                    if (teksTgl.includes(tglSaja)) {
                        document.getElementById('tgl-h').innerText = col[1]?.replace(/"/g,'') || '--';
                        jadwal = {
                            fajr: col[2]?.trim(), sunr: col[3]?.trim(), dhuhr: col[4]?.trim(),
                            asr: col[5]?.trim(), magh: col[6]?.trim(), isha: col[7]?.trim()
                        };
                        
                        document.getElementById('s-fajr').innerText = jadwal.fajr;
                        document.getElementById('s-sunr').innerText = jadwal.sunr;
                        document.getElementById('s-dhuhr').innerText = jadwal.dhuhr;
                        document.getElementById('s-asr').innerText = jadwal.asr;
                        document.getElementById('s-magh').innerText = jadwal.magh;
                        document.getElementById('s-isha').innerText = jadwal.isha;
                        ditemukan = true;
                        document.getElementById('debug').innerText = "Status: Jadwal OK (Tgl " + tglSaja + ")";
                        break;
                    }
                }
                if(!ditemukan) document.getElementById('debug').innerText = "Status: Tanggal " + tglSaja + " Tidak Ditemukan di Sheet";
            } catch (e) { 
                document.getElementById('debug').innerText = "Status: Gagal Load (" + e.message + ")";
            }
        }

        function jam() {
            const n = new Date();
            document.getElementById('jam').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('tgl-m').innerText = n.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        window.onload = () => {
            muatData();
            setInterval(jam, 1000);
            setInterval(muatData, 300000);
        };
    </script>
</body>
</html>
