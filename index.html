<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid DarUSSALAM - Full Screen Fix</title>
    <style>
        /* CSS DASAR */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; } // Reset semua margin dan padding
        body { 
            background: #000 url('masjid.jpg') no-repeat center center fixed; // Background foto masjid
            background-size: cover; color: white; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden; // Hilangkan scrollbar layar
        }

        /* HEADER & TAMPILAN UTAMA */
        .header-section { background: #000; text-align: center; padding: 8px 0; border-bottom: 3px solid #ff00ff; z-index: 10; }
        .header-text { font-size: 3.2rem; font-weight: 900; color: #ffd700; text-transform: uppercase; text-shadow: 0 0 15px #ff00ff; }
        
        /* FIX RUNNING TEXT: Menggunakan translate3d agar gerakan mulus (tidak patah-patah) */
        .marquee-container { background: rgba(255, 0, 255, 0.2); overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .marquee-text { 
            display: inline-block; font-size: 1.1rem; color: #fff; 
            animation: jalan 25s linear infinite; will-change: transform; 
        }
        @keyframes jalan { 
            from { transform: translate3d(100%, 0, 0); } 
            to { transform: translate3d(-100%, 0, 0); } 
        }

        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 0; }
        
        /* MODEL JAM & TANGGAL: Putih Solid dengan Shadow Hitam (Sesuai Permintaan) */
        #jam-digital, #tgl-masehi { 
            color: #ffffff; font-weight: 900; background: none; -webkit-text-fill-color: initial;
            text-shadow: 3px 3px 6px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        #jam-digital { font-size: 9.5rem; line-height: 1; margin-bottom: 10px; }

        .dates { display: flex; align-items: center; gap: 60px; font-size: 2.2rem; font-weight: 800; }
        #tgl-hijriah { color: #39FF14; text-shadow: 3px 3px 6px #000; } // Hijau Stabilo untuk Hijriah

        /* CARD INFO KAS & IMAM */
        .info-container { display: flex; gap: 30px; width: 92%; justify-content: center; margin-top: 15px; }
        .card { background: rgba(0, 0, 0, 0.85); border: 2px solid #2e7d32; border-radius: 12px; flex: 1; max-width: 550px; }
        .card-h { background: #2e7d32; color: #ffd700; padding: 10px; font-weight: bold; text-align: center; font-size: 1.3rem; }
        .card-b { padding: 12px 20px; }
        .row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; font-size: 1.2rem; padding: 8px 0; }

        /* JADWAL SHOLAT BAWAH */
        .prayer-section { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; 
            padding: 15px 20px 25px 20px; background: rgba(0, 40, 0, 0.9); border-top: 4px solid #ffd700;
        }
        .p-box { background: rgba(0,0,0,0.8); border: 2px solid #ffd700; border-radius: 10px; padding: 12px 5px; text-align: center; }
        .p-name { color: #ffd700; font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .p-time { font-size: 2.6rem; font-weight: 900; }

        /* EFEK JADWAL BERIKUTNYA */
        .next-sholat { background: linear-gradient(145deg, #ffd700, #b8860b) !important; transform: scale(1.05); box-shadow: 0 0 20px #ffd700; }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* MODE LAYAR PENUTUP (ADZAN, IQOMAH, SHOLAT) */
        #mode-sholat { 
            display: none; position: fixed; inset: 0; background: #000 !important; 
            z-index: 999999; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .big-text { color: #ffd700; font-size: 20vw; font-weight: 900; text-transform: uppercase; width: 100%; } // Ukuran huruf utama diperbesar
        .sub-text { color: #fff; font-size: 5vw; margin: 20px 0; } // Ukuran pesan pendukung diperbesar
        .blink-custom { animation: blink-logic 3s linear infinite; } // Efek berkedip
        @keyframes blink-logic { 0%, 66% { opacity: 1; } 67%, 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui-normal">
        <div class="header-section">
            <div class="header-text">MASJID DARUSSALAM</div>
            <div class="marquee-container">
                <div class="marquee-text">Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman | Tanggal & jadwal SHOLAT Mengacu KHGT Muhammadiyah</div>
            </div>
        </div>
        <div class="main-display">
            <div id="jam-digital">00:00:00</div>
            <div class="dates">
                <div id="tgl-masehi">--</div>
                <div id="tgl-hijriah">--</div>
            </div>
            <div class="info-container">
                <div class="card">
                    <div class="card-h">KEUANGAN MASJID</div>
                    <div class="card-b">
                        <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                        <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                        <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-h">IMAM & PENCERAMAH</div>
                    <div class="card-b">
                        <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                        <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                        <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="prayer-section">
            <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
            <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
            <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
            <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
            <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
            <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
        </div>
    </div>

    <div id="mode-sholat">
        <div id="msg-atas" class="sub-text"></div>
        <div id="msg-utama" class="big-text"></div>
        <div id="msg-bawah" class="sub-text"></div>
    </div>

    <script>
        // SETTING DURASI (Detik)
        const DURASI_ADZAN  = 60;   
        const DURASI_IQOMAH = 300;  
        const DURASI_SHOLAT = 600;  

        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
        let jadwal = {}; let timer; let modeAktif = false;

        // FUNGSI AMBIL DATA EXCEL
        async function muatData() {
            try {
                const res = await fetch(urlCSV + '&t=' + Date.now()); // Ambil data CSV baru
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
                const b2 = rows[2]; // Data utama di baris ke-3
                document.getElementById('tgl-hijriah').innerText = rows[1][2] + " " + b2[0];
                jadwal = { "SUBUH": b2[1].padStart(5, '0'), "SYURUQ": b2[2].padStart(5, '0'), "ZUHUR": b2[3].padStart(5, '0'), "ASHAR": b2[4].padStart(5, '0'), "MAGHRIB": b2[5].padStart(5, '0'), "ISYA": b2[6].padStart(5, '0') };
                document.getElementById('sh-subuh').innerText = jadwal.SUBUH;
                document.getElementById('sh-terbit').innerText = jadwal.SYURUQ;
                document.getElementById('sh-zuhur').innerText = jadwal.ZUHUR;
                document.getElementById('sh-ashar').innerText = jadwal.ASHAR;
                document.getElementById('sh-maghrib').innerText = jadwal.MAGHRIB;
                document.getElementById('sh-isya').innerText = jadwal.ISYA;
                document.getElementById('kas-in').innerText = b2[8];
                document.getElementById('kas-out').innerText = b2[9];
                document.getElementById('kas-saldo').innerText = b2[10];
                document.getElementById('im-t').innerText = b2[11];
                document.getElementById('im-s').innerText = b2[12];
                document.getElementById('im-j').innerText = b2[13];
                cekJadwalSholat(); // Langsung cek jadwal setelah data dimuat
            } catch (e) { console.error("CSV Error"); }
        }

        // FUNGSI UPDATE JAM (Tiap Detik)
        function updateJam() {
            const now = new Date();
            document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID'); // Update Teks Jam
            document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); // Update Teks Masehi
        }

        // FUNGSI CEK JADWAL SHOLAT (Dipisah agar tidak membebani Running Text)
        function cekJadwalSholat() {
            if (Object.keys(jadwal).length === 0) return;
            const now = new Date();
            const jamMenit = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace('.', ':');

            let foundNext = false;
            const urutan = ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"];
            urutan.forEach(s => {
                let box = document.getElementById('box-' + s);
                box.classList.remove('next-sholat');
                if (!foundNext && jamMenit < jadwal[s]) {
                    box.classList.add('next-sholat'); // Tandai jadwal berikutnya
                    foundNext = true;
                }
            });
            if (!foundNext) document.getElementById('box-SUBUH').classList.add('next-sholat');

            // Cek apakah waktu sekarang masuk waktu adzan
            for (let s in jadwal) {
                if (s !== "SYURUQ" && jamMenit === jadwal[s] && !modeAktif) {
                    mulaiModeSholat("ADZAN", s, DURASI_ADZAN);
                }
            }
        }

        // FUNGSI MODE FULL SCREEN (ADZAN -> IQOMAH -> SHOLAT)
        function mulaiModeSholat(tipe, nama, detik) {
            modeAktif = true;
            const ui = document.getElementById('mode-sholat');
            ui.style.display = 'flex'; // Munculkan layar hitam
            let sisa = detik;
            clearInterval(timer);
            
            timer = setInterval(() => {
                const m_atas = document.getElementById('msg-atas');
                const m_utama = document.getElementById('msg-utama');
                const m_bawah = document.getElementById('msg-bawah');

                m_atas.classList.remove('blink-custom');
                m_utama.classList.remove('blink-custom');

                if (tipe === "ADZAN") {
                    m_atas.innerText = "SAAT ADZAN";
                    m_atas.style.color = "#ff0084"; // Pink terang
                    m_utama.innerText = nama;
                    m_utama.style.color = "#B1FB17"; // Hijau stabilo
                    m_utama.classList.add('blink-custom');
                    m_bawah.innerText = "Harap Tenang & Mendengarkan";
                    m_bawah.style.color = "#ffd700"; // Emas
                } 
                else if (tipe === "IQOMAH") {
                    m_atas.innerText = "MENUJU IQOMAH";
                    m_atas.style.color = "#ff0084";
                    m_atas.classList.add('blink-custom'); 
                    let min = Math.floor(sisa / 60); let sec = sisa % 60;
                    m_utama.innerText = `${min}:${sec < 10 ? '0'+sec : sec}`; // Hitung mundur iqomah
                    m_utama.style.color = "#B1FB17";
                    m_bawah.innerText = "MATIKAN HP & DIRIKAN SHOLAT SUNAH";
                    m_bawah.style.color = "#ffffff";
                } 
                else if (tipe === "SHOLAT") {
                    m_atas.innerText = "DIRIKAN";
                    m_atas.style.color = "#ff0084";
                    m_utama.innerText = "SHOLAT";
                    m_utama.style.color = "#B1FB17";
                    m_utama.classList.add('blink-custom');
                    m_bawah.innerText = "NIAT & SHOLAT DENGAN KHUSYU'";
                    m_bawah.style.color = "#ffffff";
                }

                sisa--;
                if (sisa < 0) {
                    clearInterval(timer);
                    if (tipe === "ADZAN") mulaiModeSholat("IQOMAH", nama, DURASI_IQOMAH);
                    else if (tipe === "IQOMAH") mulaiModeSholat("SHOLAT", nama, DURASI_SHOLAT);
                    else { ui.style.display = 'none'; modeAktif = false; } // Selesai, kembali ke normal
                }
            }, 1000);
        }

        // INTERVAL PENGGERAK UTAMA
        setInterval(updateJam, 1000); // Jam update tiap detik
        setInterval(cekJadwalSholat, 30000); // Cek jadwal tiap 30 detik (lebih ringan)
        muatData(); // Muat data Excel pertama kali
        setInterval(muatData, 600000); // Sinkronisasi Excel tiap 10 menit
    </script>
</body>
</html>
