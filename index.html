<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid DarUSSALAM - Full Screen Adzan</title>
    <style>
        /* CSS DASAR - Reset agar tidak ada scroll */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #000 url('Foto masjid darussalam.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER KAPSUL */
        .header-section { text-align: center; padding: 5px 0; flex-shrink: 0; }
        
        .header-wrapper {
            display: inline-block;
            background: #000000;
            padding: 5px 30px;
            border-radius: 50px;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        .header-text { 
            font-family: 'Arial Black', sans-serif; 
            font-size: clamp(1.2rem, 4vw, 3rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            display: inline-flex; 
            overflow: hidden;
        }

        .header-text span {
            display: inline-block;
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 0 0 #070707) drop-shadow(-2px 0 0 #070707) drop-shadow(0 2px 0 #070707) drop-shadow(0 -2px 0 #070707) drop-shadow(0 0 4px #ffd700);
            opacity: 0;
            transform: scale(0); 
            animation: masuk-zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes masuk-zoom { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }
        .hilang { animation: keluar-halus 1s ease-in forwards !important; }
        @keyframes keluar-halus { to { opacity: 0; transform: translateY(10px); } }

        /* RUNNING TEXT */
        .marquee-container { 
            margin: 5px auto; 
            width: 90%; 
            background: rgba(0, 0, 0, 0.7); 
            padding: 5px 15px; 
            border-radius: 50px; 
            border: 2px solid #D4AF37; 
            text-align: center;
        }
        .marquee-text { font-size: clamp(0.8rem, 2vw, 1.1rem); font-weight: bold; transition: opacity 1s; opacity: 1; }

        /* AREA TENGAH - Dibuat fleksibel agar tidak mendorong bawah */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-evenly; 
            align-items: center; 
            padding: 5px;
            min-height: 0; /* Penting agar flexbox tidak overflow */
        }

        #jam-digital {
            font-family: 'Arial Black', sans-serif;
            font-size: clamp(3.5rem, 16vw, 11rem); 
            font-weight: 900;
            line-height: 1;
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 0 0 #070707) drop-shadow(-2px 0 0 #070707) drop-shadow(0 2px 0 #070707) drop-shadow(0 -2px 0 #070707) drop-shadow(0 0 10px #ffd700);
        }

        .dates { display: flex; gap: 8px; justify-content: center; width: 100%; }
        #tgl-masehi, #tgl-hijriah { 
            background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 50px; border: 2px solid #D4AF37;
            font-size: clamp(0.7rem, 2.2vw, 1.2rem); font-weight: 800;
        }
        #tgl-hijriah { color: #CCFF00; }

        /* INFO BOX */
        .info-container { display: flex; gap: 10px; width: 95%; max-width: 900px; }
        .card { background: rgba(0,0,0,0.85); border: 1.5px solid #D4AF37; border-radius: 10px; flex: 1; overflow: hidden; }
        .card-h { background: #000; color: #D4AF37; padding: 4px; font-weight: bold; text-align: center; font-size: clamp(0.6rem, 1.6vw, 0.9rem); border-bottom: 1.5px solid #D4AF37; }
        .card-b { padding: 5px 10px; }
        .row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-size: clamp(0.6rem, 1.6vw, 0.9rem); padding: 3px 0; }

        /* JADWAL SHOLAT - Bagian Bawah */
        .prayer-section {
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 5px;
            padding: 10px; 
            background: rgba(0,0,0,0.8);
            border-top: 3px solid #ffd700;
            flex-shrink: 0;
        }
        .p-box { background: rgba(0,0,0,0.5); border: 1.5px solid #ffd700; border-radius: 8px; padding: 5px 2px; text-align: center; }
        .p-name { color: #ffd700; font-size: clamp(0.55rem, 1.3vw, 0.8rem); font-weight: bold; }
        .p-time { font-size: clamp(0.9rem, 3.2vw, 2rem); font-weight: 900; color: white; }
        .next-sholat { background: linear-gradient(145deg, #ffd700, #b8860b) !important; }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* PERBAIKAN KHUSUS ANDROID/HP */
        @media (max-width: 768px) {
            .prayer-section { grid-template-columns: repeat(3, 1fr); }
            .info-container { flex-direction: row; } /* Tetap jejer agar hemat tempat vertikal */
            .main-display { justify-content: center; gap: 10px; }
            #jam-digital { margin: 10px 0; }
        }

        /* MODAL ADZAN */
        #mode-sholat { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; }
        .big-text { background: linear-gradient(to bottom, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 15vw; font-weight: 900; }
        .sub-text { color: #D4AF37; font-size: 5vw; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-normal" style="height: 100vh; display: flex; flex-direction: column;">
    <div class="header-section">
        <div class="header-wrapper"><div id="header-animasi" class="header-text"></div></div>
        <div class="marquee-container"><div id="text-berita" class="marquee-text">Pemuat data...</div></div>
    </div>

    <div class="main-display">
        <div id="jam-digital">00:00:00</div>
        <div class="dates">
            <div id="tgl-masehi">--</div>
            <div id="tgl-hijriah">--</div>
        </div>
        <div class="info-container">
            <div class="card">
                <div class="card-h">KEUANGAN</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                    <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                    <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">PETUGAS</div>
                <div class="card-b">
                    <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                    <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                    <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="prayer-section">
        <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
        <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
        <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
        <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
        <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
        <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
    </div>
</div>

<div id="mode-sholat">
    <div id="msg-atas" class="sub-text"></div>
    <div id="msg-utama" class="big-text"></div>
    <div id="msg-bawah" class="sub-text"></div>
</div>

<script>
    const DURASI_ADZAN = 120; const DURASI_IQOMAH = 720; const DURASI_SHOLAT = 30; 
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
    let jadwal = {}; let timer; let modeAktif = false;

    function jalankanAnimasiHuruf() {
        const wadah = document.getElementById('header-animasi');
        const kata = "MASJID DARUSSALAM";
        wadah.innerHTML = "";   
        kata.split("").forEach((huruf, urutan) => {
            const span = document.createElement("span");
            span.innerHTML = huruf === " " ? "&nbsp;" : huruf;
            span.style.animationDelay = `${urutan * 0.1}s`;
            wadah.appendChild(span);
        });
        setTimeout(() => {
            const semuaHuruf = wadah.querySelectorAll('span');
            semuaHuruf.forEach(s => s.classList.add('hilang'));
            setTimeout(jalankanAnimasiHuruf, 600);            
        }, 5000);
    }    
    jalankanAnimasiHuruf();

    async function muatData() {
        try {
            const res = await fetch(urlCSV + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            const b2 = rows[2];
            document.getElementById('tgl-hijriah').innerText = rows[1][2] + " " + b2[0];
            jadwal = { "SUBUH": b2[1], "SYURUQ": b2[2], "ZUHUR": b2[3], "ASHAR": b2[4], "MAGHRIB": b2[5], "ISYA": b2[6] };
            document.getElementById('sh-subuh').innerText = jadwal.SUBUH;
            document.getElementById('sh-terbit').innerText = jadwal.SYURUQ;
            document.getElementById('sh-zuhur').innerText = jadwal.ZUHUR;
            document.getElementById('sh-ashar').innerText = jadwal.ASHAR;
            document.getElementById('sh-maghrib').innerText = jadwal.MAGHRIB;
            document.getElementById('sh-isya').innerText = jadwal.ISYA;
            document.getElementById('kas-in').innerText = b2[8];
            document.getElementById('kas-out').innerText = b2[9];
            document.getElementById('kas-saldo').innerText = b2[10];
            document.getElementById('im-t').innerText = b2[11];
            document.getElementById('im-s').innerText = b2[12];
            document.getElementById('im-j').innerText = b2[13];
        } catch (e) { console.error("CSV Error"); }
    }

    function sistemWaktu() {
        const now = new Date();
        const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID');
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

        let foundNext = false;
        ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"].forEach(s => {
            let box = document.getElementById('box-' + s);
            box.classList.remove('next-sholat');
            if (!foundNext && jamMenit < jadwal[s]) { box.classList.add('next-sholat'); foundNext = true; }
        });
        if (!foundNext) document.getElementById('box-SUBUH').classList.add('next-sholat');

        for (let s in jadwal) { if (s !== "SYURUQ" && jamMenit === jadwal[s] && !modeAktif) mulaiModeSholat("ADZAN", s, DURASI_ADZAN); }
    }

    const daftarTeks = ["Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman", "Tanggal & Jadwal SHOLAT Mengacu KHGT"];
    let indeksTeks = 0;
    function gantiTeksBerita() {
        const el = document.getElementById('text-berita');
        if (el) {
            el.style.opacity = 0;
            setTimeout(() => {
                indeksTeks = (indeksTeks + 1) % daftarTeks.length;
                el.innerText = daftarTeks[indeksTeks];
                el.style.opacity = 1;
            }, 1000); 
        }
    }
    setInterval(gantiTeksBerita, 7000);
    setInterval(sistemWaktu, 1000);
    muatData(); setInterval(muatData, 600000);

    function mulaiModeSholat(tipe, nama, detik) {
        modeAktif = true;
        document.getElementById('mode-sholat').style.display = 'flex';
        let sisa = detik;
        clearInterval(timer);
        timer = setInterval(() => {
            const m_utama = document.getElementById('msg-utama');
            const m_atas = document.getElementById('msg-atas');
            const m_bawah = document.getElementById('msg-bawah');
            if (tipe === "ADZAN") { m_atas.innerText = "ADZAN"; m_utama.innerText = nama; m_bawah.innerText = "Harap Tenang"; }
            else if (tipe === "IQOMAH") { m_atas.innerText = "IQOMAH"; m_utama.innerText = Math.floor(sisa/60) + ":" + (sisa%60).toString().padStart(2,'0'); m_bawah.innerText = "Matikan HP"; }
            else { m_atas.innerText = "DIRIKAN"; m_utama.innerText = "SHOLAT"; m_bawah.innerText = "Niat Khusyu'"; }
            sisa--;
            if (sisa < 0) {
                if (tipe === "ADZAN") mulaiModeSholat("IQOMAH", nama, DURASI_IQOMAH);
                else if (tipe === "IQOMAH") mulaiModeSholat("SHOLAT", nama, DURASI_SHOLAT);
                else { document.getElementById('mode-sholat').style.display = 'none'; modeAktif = false; clearInterval(timer); }
            }
        }, 1000);
    }
</script>
</body>
</html>
