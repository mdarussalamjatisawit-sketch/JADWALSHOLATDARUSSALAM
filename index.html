<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid DarUSSALAM - Responsive Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background: #000 url('masjid.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1; }
        
        /* HEADER RESPONSIF */
        .header-section { 
            background: #000; text-align: center; padding: 10px 5px; border-bottom: 3px solid #ff00ff; 
            box-shadow: 0 0 15px #ff00ff; width: 100%;
        }
        .header-text {
            font-size: clamp(1.5rem, 8vw, 4.5rem); /* Menyesuaikan ukuran layar otomatis */
            font-weight: 900; color: #ffd700; text-transform: uppercase;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; letter-spacing: 2px;
        }

        .marquee-box { background: rgba(0,0,0,0.8); color: #fff; padding: 5px 0; font-size: clamp(0.8rem, 3vw, 1.2rem); overflow: hidden; }
        .marquee { display: inline-block; white-space: nowrap; padding-left: 100%; animation: jalan 25s linear infinite; }
        @keyframes jalan { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* JAM & TANGGAL */
        .clock-section { text-align: center; padding: 10px 0; flex-shrink: 0; }
        #jam-digital { font-size: clamp(3rem, 15vw, 8rem); font-weight: bold; line-height: 1; }
        .dates { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 5px; }
        #tgl-masehi { font-size: clamp(1rem, 4vw, 2rem); color: #ffd700; }
        #tgl-hijriah { font-size: clamp(1rem, 4vw, 2rem); color: #00ff00; font-weight: bold; }

        /* INFO KAS & PETUGAS (Fleksibel untuk HP) */
        .info-section { 
            display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; flex: 1; justify-content: center;
        }
        .card { 
            background: rgba(0, 0, 0, 0.7); border: 2px solid #2e7d32; border-radius: 10px; 
            overflow: hidden; flex: 1; min-width: 280px; max-width: 500px;
        }
        .card-h { background: #2e7d32; color: #ffd700; padding: 5px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        .card-b { padding: 10px; }
        .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #444; font-size: 1.1rem; }

        /* JADWAL SHOLAT RESPONSIF */
        .prayer-section { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 8px; padding: 10px; background: rgba(0, 40, 0, 0.8); border-top: 3px solid #ffd700; 
        }
        .p-box { background: rgba(0, 0, 0, 0.6); border: 2px solid #ffd700; border-radius: 8px; padding: 10px; text-align: center; }
        .p-name { color: #ffd700; font-size: 0.9rem; font-weight: bold; }
        .p-time { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: bold; }

        /* HIGHLIGHT WAKTU BERIKUTNYA (LOGIKA EMAS) */
        .next-sholat { 
            background: linear-gradient(145deg, #ffd700, #b8860b) !important; 
            transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); border: 2px solid #fff;
        }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* MODE ADZAN/IQOMAH (HITAM TOTAL) */
        #mode-sholat {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; text-align: center; justify-content: center; align-items: center; flex-direction: column;
        }
        .big-text { 
            color: #fff; font-size: 15vw; font-weight: 900; line-height: 1; 
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; text-transform: uppercase;
        }
        .judul-atas { font-size: clamp(2rem, 8vw, 4rem); color: #ffd700; margin-bottom: 20px; }

        @media (max-width: 600px) {
            .prayer-section { grid-template-columns: repeat(3, 1fr); }
            #jam-digital { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="ui-normal">
        <div class="header-section"><div class="header-text">MASJID DARUSSALAM</div></div>
        <div class="marquee-box"><div class="marquee">Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman &bull; Mengacu KHGT Muhammadiyah</div></div>
        
        <div class="clock-section">
            <div id="jam-digital">00:00:00</div>
            <div class="dates"><div id="tgl-masehi">--</div><div id="tgl-hijriah">--</div></div>
        </div>

        <div class="info-section">
            <div class="card">
                <div class="card-h">KEUANGAN</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                    <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                    <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">PETUGAS</div>
                <div class="card-b">
                    <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                    <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                    <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                </div>
            </div>
        </div>

        <div class="prayer-section">
            <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
            <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
            <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
            <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
            <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
            <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
        </div>
    </div>

    <div id="mode-sholat">
        <div id="msg-atas" class="judul-atas">SAAT ADZAN</div>
        <div id="msg-utama" class="big-text">--</div>
    </div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
        let jadwal = {};
        let modeAktif = false;
        let iqomahTimer = 600;

        async function muatData() {
            try {
                const res = await fetch(urlCSV + '&t=' + Date.now());
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
                const b1 = rows[1]; const b2 = rows[2];

                document.getElementById('tgl-hijriah').innerText = b1[2] + " " + b2[0];
                jadwal = { "SUBUH": b2[1], "SYURUQ": b2[2], "ZUHUR": b2[3], "ASHAR": b2[4], "MAGHRIB": b2[5], "ISYA": b2[6] };
                
                for (let s in jadwal) { document.getElementById('sh-' + (s === 'SYURUQ' ? 'terbit' : s.toLowerCase())).innerText = jadwal[s]; }

                document.getElementById('kas-in').innerText = b2[8];
                document.getElementById('kas-out').innerText = b2[9];
                document.getElementById('kas-saldo').innerText = b2[10];
                document.getElementById('im-t').innerText = b2[11];
                document.getElementById('im-s').innerText = b2[12];
                document.getElementById('im-j').innerText = b2[13];
            } catch (e) { console.error("Update data gagal"); }
        }

        function jamAktif() {
            const now = new Date();
            const jamStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace('.', ':');
            document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            // LOGIKA WARNA EMAS: MENCARI WAKTU SHOLAT BERIKUTNYA
            let foundNext = false;
            let listS = ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"];
            
            listS.forEach(s => {
                let box = document.getElementById('box-' + s);
                box.classList.remove('next-sholat');
                if (!foundNext && jamStr < jadwal[s]) {
                    box.classList.add('next-sholat');
                    foundNext = true;
                }
            });
            // Jika sudah lewat Isya, maka Subuh besok adalah yang berikutnya
            if (!foundNext) document.getElementById('box-SUBUH').classList.add('next-sholat');

            // LOGIKA ADZAN & SUBUR MUNCUL
            let adzanTiba = false; let namaS = "";
            for (let s in jadwal) {
                if (s !== "SYURUQ" && jamStr === jadwal[s]) { adzanTiba = true; namaS = s; break; }
            }

            const alertDiv = document.getElementById('mode-sholat');
            if (adzanTiba && !modeAktif) {
                modeAktif = true; alertDiv.style.display = 'flex';
                document.getElementById('msg-atas').innerText = "SAAT ADZAN";
                document.getElementById('msg-utama').innerText = namaS;
                iqomahTimer = 60;
            } else if (modeAktif && iqomahTimer > 0) {
                iqomahTimer--;
                let m = Math.floor(iqomahTimer / 60); let d = iqomahTimer % 60;
                document.getElementById('msg-atas').innerText = "MENUJU IQOMAH";
                document.getElementById('msg-utama').innerText = `${m}:${d < 10 ? '0'+d : d}`;
            } else if (modeAktif && iqomahTimer <= 0) {
                document.getElementById('msg-atas').innerText = "DIRIKAN SHOLAT";
                document.getElementById('msg-utama').innerText = "LURUSKAN SHAF";
                setTimeout(() => { modeAktif = false; alertDiv.style.display = 'none'; }, 180000);
            }
        }

        setInterval(jamAktif, 1000); muatData();
        setInterval(muatData, 600000);
    </script>
</body>
</html>
