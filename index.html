<!DOCTYPE html>
<html>
<head>
    <title>Debug Data Mentah</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; font-size: 1.2rem; }
        .baris-data { border: 1px solid #333; padding: 10px; margin-bottom: 20px; background: #111; }
        .kolom-item { color: #fff; margin-left: 20px; border-bottom: 1px solid #222; }
        h2 { color: yellow; }
    </style>
</head>
<body>

    <h2>HASIL BACA SPREADSHEET (TANGGAL HARI INI)</h2>
    <div id="debug-output">Sedang menarik data dari Google Sheets...</div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';

        async function bacaData() {
            const output = document.getElementById('debug-output');
            try {
                const response = await fetch(urlCSV + '&cache=' + Date.now());
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                
                // Ambil tanggal hari ini (angka 10)
                const tglSkrg = new Date().getDate().toString();
                let htmlKonten = "";
                let ketemu = false;

                for (let i = 0; i < rows.length; i++) {
                    // Pecah kolom dengan koma
                    let cols = rows[i].split(',').map(v => v.replace(/"/g, '').trim());

                    // Cari baris yang mengandung angka 10 (tanggal hari ini)
                    if (cols[0].includes(tglSkrg) || i === 0) {
                        ketemu = true;
                        htmlKonten += `<div class="baris-data">`;
                        htmlKonten += `<strong>BARIS KE-${i} ${i===0 ? '(JUDUL)' : '(DATA HARI INI)'}:</strong><br>`;
                        
                        cols.forEach((isi, index) => {
                            htmlKonten += `<div class="kolom-item">Kolom [${index}]: ${isi || '<span style="color:red">KOSONG</span>'}</div>`;
                        });
                        
                        htmlKonten += `</div>`;
                    }
                }

                output.innerHTML = ketemu ? htmlKonten : "Data tanggal " + tglSkrg + " tidak ditemukan di sheet.";

            } catch (err) {
                output.innerHTML = "<span style='color:red'>Gagal koneksi: " + err.message + "</span>";
            }
        }

        bacaData();
    </script>
</body>
</html>
